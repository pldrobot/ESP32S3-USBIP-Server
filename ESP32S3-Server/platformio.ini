; =============================================================
; ESP32-S3 USB/IP Bridge - PlatformIO Configuration
; Hardware: ESP32-S3-N16R8 (16MB Flash / 8MB PSRAM)
;
; Before building: copy .env.template to .env and fill in your values.
; The pre-build script (tools/load_env.py) reads .env and generates
; src/config_env.h automatically on every 'pio run'.
; =============================================================

; ── Shared settings inherited by both environments ────────────────────────────
[common]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_build.partitions          = partitions_ota16mb.csv

; CRITICAL: USB OTG Host mode — required for USB printer driver.
; Without these the USB-C port acts as CDC serial, not USB Host.
build_unflags =
    -DARDUINO_USB_MODE
    -DARDUINO_USB_CDC_ON_BOOT

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DREMOTEDEBUG_DISABLE_MDNS

lib_deps =
    karol-brejna-i/RemoteDebug@^4.0.1

; Reads .env and generates src/config_env.h before every build
extra_scripts = pre:tools/load_env.py

; ── USB upload (initial flash via USB cable) ──────────────────────────────────
[env:esp32s3]
extends       = common
; upload_port = COM13        ; <-- set your USB serial port (e.g. COM3, /dev/ttyUSB0)
upload_speed  = 921600
; monitor_port = COM13       ; <-- same port as upload_port
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

; ── OTA upload + RemoteDebug monitor (after first flash) ─────────────────────
; upload_port and --auth are injected automatically from .env by tools/load_env.py
; monitor_port: set to socket://<OTA_HOSTNAME>.lan:23  (or use IP address)
[env:esp32s3_ota]
extends         = common
upload_protocol = espota
; upload_port, upload_flags (--auth), and monitor_port are all injected at
; build time by tools/load_env.py from OTA_HOSTNAME and OTA_PASSWORD in .env
monitor_speed   = 115200
